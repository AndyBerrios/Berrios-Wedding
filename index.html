<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Save the Date</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="page">
    <div class="scene">
      <div class="card-wrap" id="cardWrap">
        <div class="card" id="card">

          <section class="face front">
            <!-- Front image changes based on rotation history -->
            <img class="card-img" id="frontImg" src="" alt="" draggable="false" />
          </section>

          <section class="face back">
            <!-- Back image is always the same -->
            <img class="card-img" id="backImg" src="" alt="" draggable="false" />
          </section>

        </div>
      </div>
    </div>
  </main>

  <script src="script.js"></script>
</body>
</html>
